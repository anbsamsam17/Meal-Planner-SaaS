[project]
name = "mealplanner-db"
version = "0.1.0"
requires-python = ">=3.12"
# FIX #1 (review Phase 1 2026-04-12) : package partagé pour l'accès aux modèles SQLAlchemy
# par apps/api ET apps/worker sans duplication de code.
# Stratégie choisie : package de ré-export (pas de déplacement des modèles).
# Les modèles restent dans apps/api/src/db/models/ (propriété database-administrator).
# Ce package expose les mêmes objets via mealplanner_db.* pour le worker.
# NOTA devops-engineer : ajouter "packages/db" dans [tool.uv.workspace] members du pyproject.toml racine.
dependencies = [
  "sqlalchemy[asyncio]>=2.0",
  "asyncpg>=0.29",
  "pgvector>=0.3",
  "pydantic>=2.7",
  "pydantic-settings>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]
