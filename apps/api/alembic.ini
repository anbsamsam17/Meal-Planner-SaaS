# alembic.ini — Configuration Alembic pour MealPlanner SaaS
# Référence : https://alembic.sqlalchemy.org/en/latest/tutorial.html
#
# DATABASE_URL est injectée dynamiquement dans env.py via os.environ.
# Ne jamais mettre de credentials dans ce fichier (versionné).

[alembic]
# Chemin relatif au répertoire contenant alembic.ini (apps/api/)
script_location = alembic

# Convention de nommage des fichiers de migration : date + heure + index + description
# Exemple : 20260412_1200_0001_initial_schema.py
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(rev)s_%%(slug)s

# Fuseau horaire UTC pour la génération des timestamps de migration
# Garantit la cohérence entre développeurs dans des fuseaux différents
timezone = UTC

# Encodage des fichiers de migration générés
output_encoding = utf-8

# Durée max d'un lock Alembic en secondes (évite les locks zombies)
lock_timeout = 30

# sqlalchemy.url est écrasé dynamiquement dans env.py — cette valeur est ignorée en pratique.
# On la laisse comme documentation de l'URL attendue.
sqlalchemy.url = postgresql+asyncpg://user:pass@host:5432/dbname

[post_write_hooks]
# Formater automatiquement les fichiers de migration avec ruff après génération
# Nécessite : uv add --dev ruff
hooks = ruff_format

ruff_format.type = exec
ruff_format.executable = %(here)s/../../.venv/bin/ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
